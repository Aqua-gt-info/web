<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plantas en Venta | AQUA-GT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
    
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #124f7e;
    }
    header {
      background: #001427;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .filtros {
      max-width: 1200px;
      margin: 30px auto 0;
      text-align: center;
      gap: 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
    .filtros button {
      background: #007BFF;
      border: none;
      color: white;
      padding: 12px 25px;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .filtros button:hover,
    .filtros button.active {
      background: #0056b3;
    }
    .contenedor-productos {
      max-width: 1200px;
      margin: 40px auto 60px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      align-items: stretch;
    }
    .producto {
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 250px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      text-align: center;
    }
    .producto img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }
    .producto h3 {
      font-size: 1.2rem;
      color: #001427;
      margin: 10px 0;
      min-height: 3em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Asegura la clase precio para detectar el precio */
    .producto p.precio {
      font-weight: bold;
      color: #007BFF;
      margin: 0 0 10px;
      min-height: 1.5em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .producto button {
      margin-top: auto;
      background: #007BFF;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.3s ease;
    }
    .producto button:hover {
      background: #0056b3;
    }
    /* Estilo para el carrito */
    #carrito-icono {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #007BFF;
      color: white;
      padding: 10px 15px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
    }
    #contador-carrito {
      font-size: 0.8rem;
      background: red;
      padding: 2px 6px;
      border-radius: 10px;
      position: absolute;
      top: -5px;
      right: -5px;
    }
    #modal-carrito {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 350px;
      height: 100vh;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      padding: 20px;
      overflow-y: auto;
      z-index: 999;
    }
    #lista-carrito {
      list-style: none;
      padding: 0;
    }
    #lista-carrito li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #lista-carrito button.eliminar {
      background: #dc3545;
      border: none;
      color: white;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
    }
  </style>
</head>
 
  <body>

  <header>
    <h1>Plantas en Venta</h1>
  </header>



  <!------------------------------------------------ Botones para filtro ----------------------------------------------------------------------------------------->


 <div class="filtros">
    <button type="button" class="active" data-categoria="todos">Todos</button>
    <button type="button" data-categoria="Ofertas y Promociones">Ofertas y Promociones</button>
  <button onclick="window.location.href='index.html';"
    style="background:#28a745; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">
    Volver al Inicio
  </button>
</div>


  </div>



  <section class="contenedor-productos">


    <!---------------------------------------------------------- PLANTAS TODAS--------------------------------------------------------------------------------------->


<div class="producto" data-categoria="todos">
  <img src="img/amazonica-removebg-preview.png" alt="Amazonica" />
  <h3>Amazonica</h3>
  <p class="precio">Q5.00</p>
  <button><i class="fas fa-cart-plus"></i> Agregar al carrito</button>
</div>



<!--------------------------------------------------------------------------- Ofertas y Promociones ---------------------------------------------------------------------->
<div class="producto" data-categoria="Ofertas y Promociones">
  <img src="img/vallisneria-asiatica-removebg-preview.png" alt="Valisneria" />
  <h3>Valisneria</h3>
  <p class="precio">Q5.00</p>
  <button class="add-to-cart" data-nombre="Pez Betta" data-precio="5.00">Agregar al carrito</button>
</div>

  </section>

</body>







<!---------------------------------------------------------------------------- ICONO DEL CARRITO ---------------------------------------------------------------------------->
<div id="carrito-icono">
  <i class="fas fa-shopping-cart"></i>
  <span id="contador-carrito">0</span>
</div>


<!---------------------------------------------------------------------------- MODAL DEL CARRITO ---------------------------------------------------------------------------->
<div id="modal-carrito" style="display:none;">
  <h2>Tu Carrito</h2>
  <ul id="lista-carrito"></ul>
  <hr>
  <p style="font-weight:bold;">Total: Q<span id="total-carrito">0.00</span></p>

  <!-------------------------------------------------------------------------- Nombre del cliente --------------------------------------------------------------------------->
  <label for="nombreCliente">Tu nombre:</label>
  <input type="text" id="nombreCliente" placeholder="Escribe tu nombre"
         style="margin-bottom:10px;display:block;width:100%;padding:8px;border-radius:6px;border:1px solid #ccc;">

<!-- Botón: Finalizar pedido -->
<button onclick="enviarPedidoPorWhatsApp()"
        style="margin-top:10px;background:#28a745;color:#fff;border:none;padding:10px 15px;cursor:pointer;width:100%;">
  Finalizar pedido por WhatsApp
</button>

<!-- Botón: Vaciar carrito -->
<button id="boton-vaciar-carrito"
        style="margin-top:10px;background:#001427;color:#fff;border:none;padding:10px 15px;cursor:pointer;width:100%;">
  Vaciar carrito
</button>

<!-- Botón: Cerrar -->
<button onclick="cerrarCarrito()"
        style="margin-top:10px;background:#dc3545;color:#fff;border:none;padding:10px 15px;cursor:pointer;width:100%;">
  Cerrar
</button>

  
</div>
  <!-- ESTILOS DEL MODAL Y CARRITO -->
  <style>
  #lista-carrito li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #ccc;
  }

  .detalle-producto {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow: hidden;
  }

  .nombre-producto {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .botones-cantidad {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .botones-cantidad button {
    background: #f0f0f0;
    border: none;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
  }

  .precio-item {
    font-weight: 600;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  .boton-eliminar {
    background: #dc3545;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
  }


  </style>

<script>
    

/* -------------------------------------------------------------------------  FILTRO DE CATEGORÍAS  ---------- */
const botonesFiltro = document.querySelectorAll('.filtros button');
const productos     = document.querySelectorAll('.producto');

botonesFiltro.forEach(btn => {
  btn.addEventListener('click', () => {
    botonesFiltro.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const cat = btn.getAttribute('data-categoria');
    productos.forEach(prod => {
      const catProd = prod.getAttribute('data-categoria');
      prod.style.display = (cat === 'todos' || cat === catProd) ? 'flex' : 'none';
    });
  });
});

/* ----------  CARRITO  ---------- */
const carritoIcono      = document.getElementById('carrito-icono');
const modalCarrito      = document.getElementById('modal-carrito');
const listaCarrito      = document.getElementById('lista-carrito');
const totalCarritoSpan  = document.getElementById('total-carrito');
const contadorCarrito   = document.getElementById('contador-carrito');
const nombreClienteIn   = document.getElementById('nombreCliente');

let carrito = [];

// Cargar carrito guardado en localStorage
function cargarCarrito() {
  const carritoGuardado = localStorage.getItem('carrito');
  if (carritoGuardado) {
    carrito = JSON.parse(carritoGuardado);
  } else {
    carrito = [];
  }
  actualizarCarrito();
}

// Guardar carrito en localStorage
function guardarCarrito() {
  localStorage.setItem('carrito', JSON.stringify(carrito));
}

/* Agregar al carrito */
document.querySelectorAll('.producto button').forEach(btn => {
  btn.addEventListener('click', () => {
    const prod = btn.closest('.producto');
    const nombre = prod.querySelector('h3').textContent.trim();
    const precio = parseFloat(
      prod.querySelector('.precio').textContent.replace(/[^\d.]/g, '')
    );

    const item = carrito.find(p => p.nombre === nombre);
    if (item) {
      item.cantidad++;
    } else {
      carrito.push({ nombre, precio, cantidad: 1 });
    }
    actualizarCarrito();
    guardarCarrito();
  });
});



document.getElementById('boton-vaciar-carrito').addEventListener('click', function () {
  if (carrito.length === 0) {
    alert('El carrito ya está vacío');
    return;
  }

  if (confirm('¿Estás seguro de que deseas vaciar el carrito?')) {
    carrito = []; // Vacía el arreglo
    actualizarCarrito(); // Refresca el DOM
    localStorage.removeItem('carrito'); // Limpia el localStorage
  }
});

/* Mostrar / ocultar modal */
carritoIcono.addEventListener('click', () => modalCarrito.style.display = 'block');
function cerrarCarrito() { modalCarrito.style.display = 'none'; }

/* Actualizar listado */
function actualizarCarrito() {
  listaCarrito.innerHTML = '';
  let total = 0;

  carrito.forEach((item, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="detalle-producto">
        <span class="nombre-producto" title="${item.nombre}">${item.nombre}</span>
      </div>
      <div class="botones-cantidad">
        <button onclick="disminuirCantidad(${i})">−</button>
        <span class="cantidad">x${item.cantidad}</span>
        <button onclick="aumentarCantidad(${i})">+</button>
      </div>
      <span class="precio-item">Q${(item.precio * item.cantidad).toFixed(2)}</span>
      <button class="boton-eliminar" onclick="eliminarDelCarrito(${i})">X</button>
    `;
    listaCarrito.appendChild(li);
    total += item.precio * item.cantidad;
  });

  totalCarritoSpan.textContent = total.toFixed(2);
  contadorCarrito.textContent = carrito.reduce((s, i) => s + i.cantidad, 0);
  guardarCarrito();
}

/* Botones +  −  X */
function aumentarCantidad(i) {
  carrito[i].cantidad++;
  actualizarCarrito();
}
function disminuirCantidad(i) {
  carrito[i].cantidad--;
  if (carrito[i].cantidad <= 0) carrito.splice(i, 1);
  actualizarCarrito();
}
function eliminarDelCarrito(i) {
  carrito.splice(i, 1);
  actualizarCarrito();
}

/* Enviar a WhatsApp */
function enviarPedidoPorWhatsApp() {
  if (carrito.length === 0) {
    alert('Tu carrito está vacío');
    return;
  }

  const nombreCliente = nombreClienteIn.value.trim();
  if (!nombreCliente) {
    alert('Por favor ingresa tu nombre');
    return;
  }

  let msg = `*Pedido de ${nombreCliente}:*%0A`;
  carrito.forEach(it => {
    msg += `- ${it.nombre} x${it.cantidad} (Q${(it.precio * it.cantidad).toFixed(2)})%0A`;
  });
  msg += `%0A*Total:* Q${totalCarritoSpan.textContent}`;

  const numero = '502XXXXXXXX'; // Reemplaza con tu número
  window.open(`https://wa.me/${numero}?text=${msg}`, '_blank');

  // Limpia
  carrito = [];
  actualizarCarrito();
  cerrarCarrito();
  nombreClienteIn.value = '';
  localStorage.removeItem('carrito');
}

// Cargar carrito al iniciar la página
cargarCarrito();
</script>
